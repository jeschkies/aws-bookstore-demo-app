name: cfn-lint

on:
  pull_request:
    paths:
      - 'template/master-fullstack.yaml'
      - '.github/workflows/cfn-lint.yml'
  push:
    branches: [main]
    paths:
      - 'template/master-fullstack.yaml'
      - '.github/workflows/cfn-lint.yml'

permissions:
  contents: read

jobs:
  cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ScottBrenner/cfn-lint-action@ed184e91f5085a2932501da8314e899e5e0ef5be  # v2.7.1
      - run: cfn-lint --non-zero-exit-code error template/master-fullstack.yaml
